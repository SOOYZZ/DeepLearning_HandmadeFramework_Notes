<svg width="100%" viewBox="0 0 680 310" role="img" style="" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">SGD 与 Momentum 优化路径对比，以及 Momentum 的数学公式</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">SGD 在细长碗形损失面上震荡前进，Momentum 因为惯性效应路径更平滑</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  <mask id="imagine-text-gaps-eu0rk6" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="310" fill="white"/><rect x="107.24479675292969" y="4" width="105.51042175292969" height="19.33333396911621" fill="black" rx="2"/><rect x="170" y="145.33334350585938" width="44" height="19.33333396911621" fill="black" rx="2"/><rect x="56" y="94" width="32" height="19.33333396911621" fill="black" rx="2"/><rect x="437.40625" y="4" width="145.1875" height="19.33333396911621" fill="black" rx="2"/><rect x="380" y="94" width="32" height="19.33333396911621" fill="black" rx="2"/><rect x="229.78125" y="245.33334350585938" width="220.4375" height="21.33333396911621" fill="black" rx="2"/><rect x="100.66667175292969" y="268.3333435058594" width="118" height="19.33333396911621" fill="black" rx="2"/><rect x="101.61458587646484" y="282.3333435058594" width="116.77083587646484" height="19.33333396911621" fill="black" rx="2"/><rect x="475.94793701171875" y="268.3333435058594" width="68.00797653198242" height="19.33333396911621" fill="black" rx="2"/><rect x="428" y="282.3333435058594" width="164" height="19.33333396911621" fill="black" rx="2"/></mask></defs>

  <!-- SGD path -->
  <text x="160" y="18" text-anchor="middle" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">SGD（震荡前进）</text>
